<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesuatu Khas Untukmu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #ffe4e1, #fff0f5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
            user-select: none;
        }
        
        /* Butang Muzik */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
            font-size: 20px;
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(5px);
            z-index: 10;
            max-width: 90%;
            width: 460px;
        }
        h1 {
            color: #ff69b4;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        /* Kesan Mesin Taip */
        .text-wrap {
            min-height: 120px;
            margin-bottom: 30px;
        }
        p {
            color: #555;
            line-height: 1.8;
            font-size: 1.1rem;
            display: inline;
            white-space: pre-line;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1rem;
            background-color: #ff69b4;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            position: relative;
            min-height: 50px;
        }
        button {
            padding: 12px 35px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #btn-yes {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }
        #btn-yes:hover {
            transform: scale(1.15);
            background-color: #ff4500;
        }
        #btn-no {
            background-color: #ddd;
            color: #666;
            position: relative;
        }

        /* Elemen Hujan Cinta Automatik */
        .heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 20px;
            animation: fall linear forwards;
            opacity: 0.8;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* Kesan Klik Skrin */
        .click-heart {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 999;
            font-size: 24px;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="music-btn" onclick="toggleMusic()">🎵</div>
    <audio id="bg-music" loop src="https://music.163.com/song/media/outer/url?id=1824045051.mp3"></audio>

    <div class="container">
        <h1>Pertemuan Denganmu Adalah Hal Terindah ✨</h1>
        <div class="text-wrap">
            <p id="typed-text"></p><span class="cursor"></span>
        </div>
        <div class="btn-group">
            <button id="btn-yes" onclick="agree()">Sudi</button>
            <button id="btn-no" onmouseover="moveButton()" onclick="moveButton()">Tak Sudi</button>
        </div>
    </div>

    <script>
        // 1. Kesan Mesin Taip (Typewriter)
        const textArr = [
            "Setiap hari yang dilalui bersamamu terasa sangat manis.\n",
            "Saya ingin mengubah setiap hari esok menjadi kenangan indah kita bersama.\n\n",
            "Sudikah awak menjadi pasangan hidup saya?"
        ];
        const typedTextEl = document.getElementById('typed-text');
        let fullText = textArr.join('');
        let charIndex = 0;

        function typeEffect() {
            if (charIndex < fullText.length) {
                typedTextEl.textContent += fullText.charAt(charIndex);
                charIndex++;
                setTimeout(typeEffect, 100); // Kelajuan menaip (milisaat)
            }
        }
        setTimeout(typeEffect, 500);

        // 2. Hujan Cinta & Bunga Automatik
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const icons = ['❤️', '🌸', '✨', '💕', '🍓'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 350);

        // 3. Kesan Klik Skrin (Click Effect)
        window.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('music-btn')) return;
            
            const clickHeart = document.createElement('div');
            clickHeart.classList.add('click-heart');
            const clickIcons = ['💖', '💝', '💗', '💓', '💘'];
            clickHeart.innerText = clickIcons[Math.floor(Math.random() * clickIcons.length)];
            clickHeart.style.left = e.clientX + 'px';
            clickHeart.style.top = e.clientY + 'px';
            
            document.body.appendChild(clickHeart);
            setTimeout(() => clickHeart.remove(), 1000);
        });

        // 4. Taktik Butang "Tak Sudi" (Berlari + Tukar Teks)
        const noTexts = [
            "Tak Sudi", 
            "Gaji semua bagi awak?", 
            "Saya buat semua kerja rumah?", 
            "Fikir la balik...", 
            "Tekan Sudi laaa 🥺", 
            "Tak boleh lari!"
        ];
        let textIdx = 0;

        function moveButton() {
            const btnNo = document.getElementById('btn-no');
            
            // Tukar teks butang
            textIdx = (textIdx + 1) % noTexts.length;
            btnNo.innerText = noTexts[textIdx];
            
            // Gerakkan kedudukan secara rawak
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40) + 20;
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        // 5. Pengakhiran Bahagia (Klik Sudi)
        function agree() {
            alert("Yeayyy! Saya sangat gembira! (〃'▽'〃) \nMari kita bina masa depan dan bahagia bersama selamanya!");
            document.getElementById('btn-yes').innerText = "❤ Selamanya Bersama";
        }

        // 6. Kawalan Muzik
        const music = document.getElementById('bg-music');
        const musicBtn = document.querySelector('.music-btn');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.style.animationPlayState = 'paused';
            } else {
                music.play().catch(() => {
                    alert("Disebabkan sekatan pelayar, sila klik ikon muzik sekali lagi untuk memainkan lagu ya~");
                });
                musicBtn.style.animationPlayState = 'running';
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
